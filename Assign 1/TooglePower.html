<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Home Dashboard</title>

  <style>
    body {
      background-color: white;
      color: black;
      text-align: center;
      padding-top: 100px;
      transition: 0.3s;
    }

    .dark-mode {
      background-color: black;
      color: white;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    img {
      width: 200px;
      margin-top: 20px;
      transition: opacity 0.5s ease;
    }

    .hidden {
      opacity: 0;
    }
  </style>
</head>
<body>

  <button onclick="togglePower()">Toggle Power</button>
  <button onclick="hideFan()">Hide Controls</button>

  <div>
    <img id="fan" src="https://cdn-icons-png.flaticon.com/512/2972/2972491.png" alt="Fan">
  </div>

  <script>
    function togglePower() {
      document.body.classList.toggle('dark-mode');
    }

    function hideFan() {
      document.getElementById('fan').classList.toggle('hidden');
    }
  </script>

</body>
</html>
