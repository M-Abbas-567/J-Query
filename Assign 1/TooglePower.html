<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Home Dashboard</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      background-color: white;
      color: black;
      text-align: center;
      padding-top: 100px;
      transition: 0.3s;
    }

    .dark-mode {
      background-color: black;
      color: white;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    img {
      width: 200px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <button id="powerBtn">Toggle Power</button>
  <button id="hideBtn">Hide Controls</button>

  <div>
    <img id="fan" src="https://cdn-icons-png.flaticon.com/512/2972/2972491.png" alt="Fan">
  </div>

  <script>
    $('#powerBtn').click(function () {
      $('body').toggleClass('dark-mode');
    });

    $('#hideBtn').click(function () {
      $('#fan').fadeToggle();
    });
  </script>

</body>
</html>
